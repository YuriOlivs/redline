spring:
  application:
    name: redline-core

  datasource:
    url: jdbc:postgresql://localhost:5432/redline
    username: redline
    password: redline
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true